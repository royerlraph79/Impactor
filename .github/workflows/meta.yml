name: Update metainfo on release

on:
  release:
    types:
      - published
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update metainfo
        run: ./update_meta.sh

      - name: Commit & upload
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add upload/dev.khcrysalis.PlumeImpactor.metainfo.xml
          git commit -m "Update metainfo.xml for release ${{ github.event.release.tag_name }}"
          git push

          gh release upload "${{ github.event.release.tag_name }}" upload/dev.khcrysalis.PlumeImpactor.metainfo.xml --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
