name: "macOS ARM64 Build & Release"

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Create/update a GitHub release"
        type: boolean
        default: false
      tag_name:
        description: "Tag to release, e.g. v2.2.3 (required if publish_release=true)"
        type: string
        default: ""
      draft:
        description: "Create release as draft"
        type: boolean
        default: true

permissions:
  contents: write

env:
  BINARY_NAME: plumeimpactor
  BINARY_NAME_CLI: plumesign
  BUNDLE_NAME: Impactor

jobs:
  macos-arm64:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Import code-signing certificates
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.DEV_ID_P12_BASE64 }}
          p12-password: ${{ secrets.DEV_ID_P12_PASSWORD }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build release binaries
        run: cargo build --bins --workspace --release

      - name: Prepare macOS ARM64 artifacts
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist

          cp target/release/${{ env.BINARY_NAME }} dist/${{ env.BINARY_NAME }}-macos-arm64
          cp target/release/${{ env.BINARY_NAME_CLI }} dist/${{ env.BINARY_NAME_CLI }}-macos-arm64
          chmod +x dist/${{ env.BINARY_NAME }}-macos-arm64 dist/${{ env.BINARY_NAME_CLI }}-macos-arm64

          rm -rf dist/${{ env.BUNDLE_NAME }}.app
          cp -R package/macos/${{ env.BUNDLE_NAME }}.app dist/${{ env.BUNDLE_NAME }}.app

          cp dist/${{ env.BINARY_NAME }}-macos-arm64 dist/${{ env.BUNDLE_NAME }}.app/Contents/MacOS/${{ env.BUNDLE_NAME }}
          chmod +x dist/${{ env.BUNDLE_NAME }}.app/Contents/MacOS/${{ env.BUNDLE_NAME }}

          VERSION="$(awk '/\[workspace.package\]/,/^$/' Cargo.toml | sed -nE 's/version *= *"([^"]*)".*/\1/p' | head -n1)"
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString ${VERSION}" "dist/${{ env.BUNDLE_NAME }}.app/Contents/Info.plist"
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion ${VERSION}" "dist/${{ env.BUNDLE_NAME }}.app/Contents/Info.plist"

      - name: Codesign app bundle
        run: |
          codesign --deep --force --options runtime \
            --sign "${{ secrets.DEV_ID_IDENTITY_NAME }}" \
            "dist/${{ env.BUNDLE_NAME }}.app"

      - name: Create DMG
        run: |
          rm -rf dist/dmg-root
          mkdir -p dist/dmg-root
          mv "dist/${{ env.BUNDLE_NAME }}.app" dist/dmg-root/

          create-dmg \
            --volname "${{ env.BUNDLE_NAME }}" \
            --background "package/macos/background.png" \
            --window-pos 200 120 \
            --window-size 510 350 \
            --icon-size 100 \
            --icon "${{ env.BUNDLE_NAME }}.app" 160 155 \
            --hide-extension "${{ env.BUNDLE_NAME }}.app" \
            --app-drop-link 350 155 \
            "dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg" \
            "dist/dmg-root"

      - name: Notarize and staple DMG
        run: |
          xcrun notarytool submit "dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg" \
            --apple-id "${{ secrets.APPLE_ID_EMAIL }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_ID_TEAM }}" \
            --wait

          xcrun stapler staple "dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg"

      - name: Remove unwanted standalone GUI binary
        run: rm -f "dist/${{ env.BINARY_NAME }}-macos-arm64"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-macos-arm64-release
          path: |
            dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg
            dist/${{ env.BINARY_NAME_CLI }}-macos-arm64

      - name: Determine release tag
        id: tag
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag_name }}"
          fi

          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Validate manual release input
        if: github.event_name == 'workflow_dispatch' && inputs.publish_release
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${{ steps.tag.outputs.tag }}" ]]; then
            echo "tag_name is required when publish_release=true"
            exit 1
          fi

      - name: Create or update GitHub release
        if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.publish_release)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          TAG="${{ steps.tag.outputs.tag }}"
          FILES=(
            "dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg"
            "dist/${{ env.BINARY_NAME_CLI }}-macos-arm64"
          )

          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" "${FILES[@]}" --clobber
          else
            EXTRA_ARGS=()
            if [[ "${{ github.event_name }}" == "workflow_dispatch" && "${{ inputs.draft }}" == "true" ]]; then
              EXTRA_ARGS+=(--draft)
            fi

            gh release create "$TAG" "${FILES[@]}" \
              --title "$TAG" \
              --generate-notes \
              --target "$GITHUB_SHA" \
              "${EXTRA_ARGS[@]}"
          fi
