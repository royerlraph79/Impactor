name: Release (macOS ARM64 only)

on:
  push:
    tags:
      - v*
  workflow_dispatch:

env:
  BINARY_NAME: plumeimpactor
  BINARY_NAME_CLI: plumesign
  BUNDLE_NAME: Impactor

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - run: make macos PROFILE=release BUNDLE=1

      - uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.DEV_ID_P12_BASE64 }}
          p12-password: ${{ secrets.DEV_ID_P12_PASSWORD }}

      - run: codesign --deep --force --options runtime --sign "${{ secrets.DEV_ID_IDENTITY_NAME }}" dist/Impactor.app

      - run: brew install create-dmg

      - run: |
          mkdir -p dist/dmg
          mv dist/Impactor.app dist/dmg/
          create-dmg \
            --volname "${{ env.BUNDLE_NAME }}" \
            --background "package/macos/background.png" \
            --window-pos 200 120 \
            --window-size 510 350 \
            --icon-size 100 \
            --icon "${{ env.BUNDLE_NAME }}.app" 160 155 \
            --hide-extension "${{ env.BUNDLE_NAME }}.app" \
            --app-drop-link 350 155 \
            dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg dist/dmg

      - run: |
          xcrun notarytool submit dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg \
            --apple-id "${{ secrets.APPLE_ID_EMAIL }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_ID_TEAM }}" \
            --wait
          xcrun stapler staple dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-macos-arm64
          path: dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg

  release:
    runs-on: ubuntu-latest
    needs: [build-macos]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-macos-arm64
          path: prepare/

      - name: Prepare Uploads
        run: |
          mkdir -p upload
          cp prepare/*.dmg upload/

      - id: get_version
        run: |
          VERSION=$(awk '/\[workspace.package\]/,/^$/' Cargo.toml | sed -nE 's/version *= *"([^"]*)".*/\1/p')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: v${{ steps.get_version.outputs.version }}
          tag_name: v${{ steps.get_version.outputs.version }}
          files: upload/*
          generate_release_notes: true
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
