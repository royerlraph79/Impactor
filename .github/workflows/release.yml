name: Build Nugget

on:
  workflow_dispatch:
    inputs:
      build_for_macos_intel:
        description: 'Build macOS Intel'
        required: false
        default: true
        type: boolean
      build_for_macos_arm:
        description: 'Build macOS ARM'
        required: false
        default: true
        type: boolean
      build_for_windows:
        description: 'Build Windows'
        required: false
        default: true
        type: boolean
      build_for_linux:
        description: 'Build Linux'
        required: false
        default: true
        type: boolean

jobs:
  build-macos-intel:
    if: ${{ inputs.build_for_macos_intel }}
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Create venv and install requirements
        shell: bash
        run: |
          python3 -m venv .env
          source .env/bin/activate
          python -m pip install --upgrade pip setuptools wheel
          pip install --no-binary sslpsk_pmd3 -r requirements.txt

      - name: Build macOS (Intel)
        shell: bash
        run: |
          source .env/bin/activate
          python compile.py

      - name: Zip Nugget.app (Intel)
        shell: bash
        run: |
          cd dist
          zip -r -y "Nugget_macOS_intel.zip" Nugget.app

      - name: Upload ZIP (Intel)
        uses: actions/upload-artifact@v6
        with:
          name: Nugget_macOS_intel
          path: dist/Nugget_macOS_intel.zip

  build-macos-arm:
    if: ${{ inputs.build_for_macos_arm }}
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Ensure OpenSSL and pkg-config are available
        shell: bash
        run: |
          if ! brew list --versions openssl@3 >/dev/null 2>&1; then
            brew install openssl@3
          fi

          if ! brew list --versions pkg-config >/dev/null 2>&1; then
            brew install pkg-config
          fi

      - name: Create venv and install requirements
        shell: bash
        run: |
          python3 -m venv .env
          source .env/bin/activate
          python -m pip install --upgrade pip setuptools wheel

          OPENSSL_PREFIX="$(brew --prefix openssl@3)"
          export CPPFLAGS="-I$OPENSSL_PREFIX/include"
          export LDFLAGS="-L$OPENSSL_PREFIX/lib"
          export PKG_CONFIG_PATH="$OPENSSL_PREFIX/lib/pkgconfig"

          pip install --no-binary sslpsk_pmd3 -r requirements.txt

      - name: Build macOS (ARM)
        shell: bash
        run: |
          source .env/bin/activate
          python compile.py

      - name: Zip Nugget.app (ARM)
        shell: bash
        run: |
          cd dist
          zip -r -y "Nugget_macOS_arm.zip" Nugget.app

      - name: Upload ZIP (ARM)
        uses: actions/upload-artifact@v6
        with:
          name: Nugget_macOS_arm
          path: dist/Nugget_macOS_arm.zip

  build-windows:
    if: ${{ inputs.build_for_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Build Windows
        shell: pwsh
        run: python compile.py

      - name: Zip Nugget (Windows)
        shell: pwsh
        run: |
          Set-Location dist
          Compress-Archive -Path Nugget -DestinationPath Nugget_Windows.zip -Force

      - name: Upload ZIP (Windows)
        uses: actions/upload-artifact@v6
        with:
          name: Nugget_Windows
          path: dist/Nugget_Windows.zip

  build-linux:
    if: ${{ inputs.build_for_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -r requirements.txt

      - name: Build Linux
        shell: bash
        run: python compile.py

      - name: Tar Nugget (Linux)
        shell: bash
        run: |
          cd dist
          tar -cJf Nugget_Linux.tar.xz Nugget

      - name: Upload TAR (Linux)
        uses: actions/upload-artifact@v6
        with:
          name: Nugget_Linux
          path: dist/Nugget_Linux.tar.xz
