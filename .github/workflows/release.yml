name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_linux:
        description: Build Linux
        type: boolean
        required: true
        default: true
      build_windows:
        description: Build Windows
        type: boolean
        required: true
        default: true
      build_macos_arm64:
        description: Build macOS Silicon / ARM64
        type: boolean
        required: true
        default: true
      build_macos_intel:
        description: Build macOS Intel
        type: boolean
        required: true
        default: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  BINARY_NAME: plumeimpactor
  BINARY_NAME_CLI: plumesign
  BUNDLE_NAME: Impactor

jobs:
  build-linux:
    if: ${{ github.event_name == 'push' || inputs.build_linux }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - os: ubuntu-24.04
            arch: x86_64
          - os: ubuntu-24.04-arm
            arch: aarch64

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable

      - name: Use Wild linker
        uses: davidlattimore/wild-action@latest

      - uses: snok/install-poetry@v1

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install and cache apt pkgs
        uses: awalsh128/cache-apt-pkgs-action@latest
        with:
          packages: flatpak flatpak-builder libglib2.0-dev libsecret-1-dev libgtk-3-dev libpng-dev libjpeg-dev libgl1-mesa-dev libglu1-mesa-dev libxkbcommon-dev libexpat1-dev libtiff-dev libxdo-dev libappindicator3-dev
          version: 1.0

      - name: Build binaries
        run: make linux PROFILE=release APPIMAGE=1

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-linux-${{ matrix.arch }}
          path: dist/*
          if-no-files-found: error

  build-windows:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: true
      matrix:
        include:
          - target: x86_64-pc-windows-gnu
            arch: x86_64
            runner: ubuntu-24.04
          - target: i686-pc-windows-gnu
            arch: x86
            runner: ubuntu-24.04
          - target: aarch64-pc-windows-msvc
            arch: arm64
            runner: windows-11-arm

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install mingw-w64 (x86_64/x86)
        if: ${{ matrix.arch == 'x86_64' || matrix.arch == 'x86' }}
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Build binaries (Linux cross-compile)
        if: ${{ matrix.arch != 'arm64' }}
        run: |
          set -euo pipefail
          cargo build --bins --workspace --release --target ${{ matrix.target }}
          mkdir -p dist
          cp target/${{ matrix.target }}/release/plumeimpactor.exe dist/Impactor-windows-${{ matrix.arch }}-portable.exe
          cp target/${{ matrix.target }}/release/plumesign.exe dist/plumesign-windows-${{ matrix.arch }}.exe

      - name: Build binaries (Windows ARM64 native)
        if: ${{ matrix.arch == 'arm64' }}
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          cargo build --bins --workspace --release --target "${{ matrix.target }}"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/plumeimpactor.exe" "dist/Impactor-windows-${{ matrix.arch }}-portable.exe"
          Copy-Item "target/${{ matrix.target }}/release/plumesign.exe" "dist/plumesign-windows-${{ matrix.arch }}.exe"

      - name: Upload binaries
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-windows-${{ matrix.arch }}
          path: dist/*.exe
          if-no-files-found: error

  build-windows-installer:
    if: ${{ github.event_name == 'push' || inputs.build_windows }}
    runs-on: windows-latest
    needs: build-windows
    strategy:
      fail-fast: true
      matrix:
        arch: [x86_64, x86, arm64]

    steps:
      - uses: actions/checkout@v5

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-windows-${{ matrix.arch }}
          path: dist

      - name: Install NSIS
        run: choco install nsis.portable -y

      - name: Build NSIS Installer
        shell: cmd
        run: |
          mkdir dist\nsis
          copy package\windows\* dist\nsis\
          copy dist\Impactor-windows-${{ matrix.arch }}-portable.exe dist\nsis\plumeimpactor.exe
          makensis dist\nsis\installer.nsi
          move dist\nsis\installer.exe dist\Impactor-windows-${{ matrix.arch }}-setup.exe

      - name: Upload installer
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-windows-installer-${{ matrix.arch }}
          path: dist/Impactor-windows-${{ matrix.arch }}-setup.exe
          if-no-files-found: error

  build-macos-slice-arm64:
    if: ${{ github.event_name == 'push' || inputs.build_macos_arm64 }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Setup osxcross
        uses: royerlraph79/setup-osxcross@a5516d5b01029e9b97d5e738664c49e7bc0fe43b
        with:
          osx-version: "12.3"

      - name: Build ARM64 slice
        shell: bash
        run: |
          set -euo pipefail

          target_env="aarch64_apple_darwin"
          target_env_upper="AARCH64_APPLE_DARWIN"
          prefix="arm64-apple-darwin21.4"
          target="aarch64-apple-darwin"

          osxcross_bin="$(dirname "$(command -v "${prefix}-clang")")"
          osxcross_root="$(cd "${osxcross_bin}/.." && pwd)"
          sdk_dir="${osxcross_root}/SDK"

          if [ -d "${sdk_dir}" ]; then
            sdkroot="$(ls -d "${sdk_dir}"/MacOSX*.sdk 2>/dev/null | sort -V | tail -n1 || true)"
            if [ -n "${sdkroot}" ]; then
              export SDKROOT="${sdkroot}"
            fi
          fi

          export MACOSX_DEPLOYMENT_TARGET="11.0"

          ld_path=""
          for name in "${prefix}-ld" "${prefix}-ld64" "ld64" "ld"; do
            if [ -x "${osxcross_bin}/${name}" ]; then
              ld_path="${osxcross_bin}/${name}"
              break
            fi
          done

          export "CC_${target_env}=${osxcross_bin}/${prefix}-clang"
          export "CXX_${target_env}=${osxcross_bin}/${prefix}-clang++"
          export "AR_${target_env}=${osxcross_bin}/${prefix}-ar"
          export "RANLIB_${target_env}=${osxcross_bin}/${prefix}-ranlib"
          export "CARGO_TARGET_${target_env_upper}_LINKER=${osxcross_bin}/${prefix}-clang"

          if [ -n "${ld_path}" ]; then
            export "CFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export "CXXFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export "LDFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }-C link-arg=-fuse-ld=${ld_path}"
          fi

          cargo build --bins --workspace --release --target "${target}"

          mkdir -p dist
          cp "target/${target}/release/plumeimpactor" "dist/plumeimpactor-macos-arm64"
          cp "target/${target}/release/plumesign" "dist/plumesign-macos-arm64"

      - name: Upload ARM64 slice
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-macos-slice-arm
          path: dist/*
          if-no-files-found: error

  build-macos-slice-intel:
    if: ${{ github.event_name == 'push' || inputs.build_macos_intel }}
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Setup osxcross
        uses: royerlraph79/setup-osxcross@a5516d5b01029e9b97d5e738664c49e7bc0fe43b
        with:
          osx-version: "12.3"

      - name: Build Intel slice
        shell: bash
        run: |
          set -euo pipefail

          target_env="x86_64_apple_darwin"
          target_env_upper="X86_64_APPLE_DARWIN"
          prefix="x86_64-apple-darwin21.4"
          target="x86_64-apple-darwin"

          osxcross_bin="$(dirname "$(command -v "${prefix}-clang")")"
          osxcross_root="$(cd "${osxcross_bin}/.." && pwd)"
          sdk_dir="${osxcross_root}/SDK"

          if [ -d "${sdk_dir}" ]; then
            sdkroot="$(ls -d "${sdk_dir}"/MacOSX*.sdk 2>/dev/null | sort -V | tail -n1 || true)"
            if [ -n "${sdkroot}" ]; then
              export SDKROOT="${sdkroot}"
            fi
          fi

          export MACOSX_DEPLOYMENT_TARGET="11.0"

          ld_path=""
          for name in "${prefix}-ld" "${prefix}-ld64" "ld64" "ld"; do
            if [ -x "${osxcross_bin}/${name}" ]; then
              ld_path="${osxcross_bin}/${name}"
              break
            fi
          done

          export "CC_${target_env}=${osxcross_bin}/${prefix}-clang"
          export "CXX_${target_env}=${osxcross_bin}/${prefix}-clang++"
          export "AR_${target_env}=${osxcross_bin}/${prefix}-ar"
          export "RANLIB_${target_env}=${osxcross_bin}/${prefix}-ranlib"
          export "CARGO_TARGET_${target_env_upper}_LINKER=${osxcross_bin}/${prefix}-clang"

          if [ -n "${ld_path}" ]; then
            export "CFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export "CXXFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export "LDFLAGS_${target_env}=-fuse-ld=${ld_path}"
            export RUSTFLAGS="${RUSTFLAGS:+$RUSTFLAGS }-C link-arg=-fuse-ld=${ld_path}"
          fi

          cargo build --bins --workspace --release --target "${target}"

          mkdir -p dist
          cp "target/${target}/release/plumeimpactor" "dist/plumeimpactor-macos-x86_64"
          cp "target/${target}/release/plumesign" "dist/plumesign-macos-x86_64"

      - name: Upload Intel slice
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-macos-slice-intel
          path: dist/*
          if-no-files-found: error

  build-macos-arm64:
    if: ${{ github.event_name == 'push' || inputs.build_macos_arm64 }}
    runs-on: macos-latest
    needs: build-macos-slice-arm64

    steps:
      - uses: actions/checkout@v5

      - name: Get ARM slice
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-macos-slice-arm
          path: dist/slices

      - name: Setup certificates
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.DEV_ID_P12_BASE64 }}
          p12-password: ${{ secrets.DEV_ID_P12_PASSWORD }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build app bundle
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          cp -R package/macos/Impactor.app dist/Impactor.app

          cp dist/slices/${{ env.BINARY_NAME }}-macos-arm64 dist/plumeimpactor-macos-arm64
          cp dist/slices/${{ env.BINARY_NAME_CLI }}-macos-arm64 dist/plumesign-macos-arm64

          cp dist/plumeimpactor-macos-arm64 dist/Impactor.app/Contents/MacOS/Impactor
          chmod +x dist/Impactor.app/Contents/MacOS/Impactor
          strip dist/Impactor.app/Contents/MacOS/Impactor || true

          VERSION=$(
            awk '/\[workspace.package\]/,/^$/' Cargo.toml \
            | sed -nE 's/version *= *"([^"]*)".*/\1/p' \
            | head -n1
          )

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" dist/Impactor.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" dist/Impactor.app/Contents/Info.plist

      - name: Codesign app
        run: |
          codesign --deep --force --options runtime \
            --sign "${{ secrets.DEV_ID_IDENTITY_NAME }}" \
            dist/Impactor.app

      - name: Create ARM64 DMG
        run: |
          mkdir -p dist/dmg-arm64
          mv dist/Impactor.app dist/dmg-arm64/

          create-dmg \
            --volname "${{ env.BUNDLE_NAME }}" \
            --background "package/macos/background.png" \
            --window-pos 200 120 \
            --window-size 510 350 \
            --icon-size 100 \
            --icon "${{ env.BUNDLE_NAME }}.app" 160 155 \
            --hide-extension "${{ env.BUNDLE_NAME }}.app" \
            --app-drop-link 350 155 \
            "dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg" \
            dist/dmg-arm64

      - name: Notarize ARM64 DMG
        run: |
          xcrun notarytool submit "dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg" \
            --apple-id "${{ secrets.APPLE_ID_EMAIL }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_ID_TEAM }}" \
            --wait
          xcrun stapler staple "dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg"

      - name: Upload ARM64 artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-macos-arm64
          path: |
            dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg
            dist/plumesign-macos-arm64
          if-no-files-found: error

  build-macos-intel:
    if: ${{ github.event_name == 'push' || inputs.build_macos_intel }}
    runs-on: macos-latest
    needs: build-macos-slice-intel

    steps:
      - uses: actions/checkout@v5

      - name: Get Intel slice
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-macos-slice-intel
          path: dist/slices

      - name: Setup certificates
        uses: apple-actions/import-codesign-certs@v6
        with:
          p12-file-base64: ${{ secrets.DEV_ID_P12_BASE64 }}
          p12-password: ${{ secrets.DEV_ID_P12_PASSWORD }}

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build app bundle
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p dist
          cp -R package/macos/Impactor.app dist/Impactor.app

          cp dist/slices/${{ env.BINARY_NAME }}-macos-x86_64 dist/plumeimpactor-macos-x86_64
          cp dist/slices/${{ env.BINARY_NAME_CLI }}-macos-x86_64 dist/plumesign-macos-x86_64

          cp dist/plumeimpactor-macos-x86_64 dist/Impactor.app/Contents/MacOS/Impactor
          chmod +x dist/Impactor.app/Contents/MacOS/Impactor
          strip dist/Impactor.app/Contents/MacOS/Impactor || true

          VERSION=$(
            awk '/\[workspace.package\]/,/^$/' Cargo.toml \
            | sed -nE 's/version *= *"([^"]*)".*/\1/p' \
            | head -n1
          )

          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" dist/Impactor.app/Contents/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $VERSION" dist/Impactor.app/Contents/Info.plist

      - name: Codesign app
        run: |
          codesign --deep --force --options runtime \
            --sign "${{ secrets.DEV_ID_IDENTITY_NAME }}" \
            dist/Impactor.app

      - name: Create Intel DMG
        run: |
          mkdir -p dist/dmg-intel
          mv dist/Impactor.app dist/dmg-intel/

          create-dmg \
            --volname "${{ env.BUNDLE_NAME }}" \
            --background "package/macos/background.png" \
            --window-pos 200 120 \
            --window-size 510 350 \
            --icon-size 100 \
            --icon "${{ env.BUNDLE_NAME }}.app" 160 155 \
            --hide-extension "${{ env.BUNDLE_NAME }}.app" \
            --app-drop-link 350 155 \
            "dist/${{ env.BUNDLE_NAME }}-macos-x86_64.dmg" \
            dist/dmg-intel

      - name: Notarize Intel DMG
        run: |
          xcrun notarytool submit "dist/${{ env.BUNDLE_NAME }}-macos-x86_64.dmg" \
            --apple-id "${{ secrets.APPLE_ID_EMAIL }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_ID_TEAM }}" \
            --wait
          xcrun stapler staple "dist/${{ env.BUNDLE_NAME }}-macos-x86_64.dmg"

      - name: Upload Intel artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.BINARY_NAME }}-macos-intel
          path: |
            dist/${{ env.BUNDLE_NAME }}-macos-x86_64.dmg
            dist/plumesign-macos-x86_64
          if-no-files-found: error

  release:
    runs-on: ubuntu-24.04
    needs:
      - build-linux
      - build-windows
      - build-windows-installer
      - build-macos-slice-arm64
      - build-macos-slice-intel
      - build-macos-arm64
      - build-macos-intel
    if: ${{ !cancelled() && !contains(needs.*.result, 'failure') }}

    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(awk '/\[workspace.package\]/,/^$/' Cargo.toml | sed -nE 's/version *= *"([^"]*)".*/\1/p' | head -n1)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Compute release metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            NAME="${TAG}"
            PRERELEASE=false
          else
            TAG="manual-v${{ steps.version.outputs.version }}-${GITHUB_RUN_NUMBER}"
            NAME="${TAG}"
            PRERELEASE=true
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

      - name: Download Linux x86_64 artifact
        if: ${{ needs.build-linux.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-linux-x86_64
          path: prepare/

      - name: Download Linux aarch64 artifact
        if: ${{ needs.build-linux.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-linux-aarch64
          path: prepare/

      - name: Download Windows x86_64 artifact
        if: ${{ needs.build-windows.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-windows-x86_64
          path: prepare/

      - name: Download Windows x86 artifact
        if: ${{ needs.build-windows.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-windows-x86
          path: prepare/

      - name: Download Windows arm64 artifact
        if: ${{ needs.build-windows.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-windows-arm64
          path: prepare/

      - name: Download Windows x86_64 installer
        if: ${{ needs.build-windows-installer.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-windows-installer-x86_64
          path: prepare/

      - name: Download Windows x86 installer
        if: ${{ needs.build-windows-installer.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-windows-installer-x86
          path: prepare/

      - name: Download Windows arm64 installer
        if: ${{ needs.build-windows-installer.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-windows-installer-arm64
          path: prepare/

      - name: Download macOS ARM64 artifact
        if: ${{ needs.build-macos-arm64.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-macos-arm64
          path: prepare/

      - name: Download macOS Intel artifact
        if: ${{ needs.build-macos-intel.result == 'success' }}
        uses: actions/download-artifact@v8
        with:
          name: ${{ env.BINARY_NAME }}-macos-intel
          path: prepare/

      - name: Prepare uploads
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p upload

          find prepare -type f \
            \( \
              -iname '*.dmg' -o \
              -iname '*.appimage' -o \
              -iname '*.exe' -o \
              -iname 'plumesign*' \
            \) \
            -exec mv -t upload {} +

          ls -la upload

          if ! find upload -maxdepth 1 -type f | grep -q .; then
            echo "No artifacts found to release."
            exit 1
          fi

      - name: Delete existing release/tag if rerunning manual build
        if: ${{ github.event_name != 'push' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release delete "${{ steps.meta.outputs.tag }}" --cleanup-tag -y || true

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          set -euo pipefail

          extra_flags=()
          if [[ "${{ steps.meta.outputs.prerelease }}" == "true" ]]; then
            extra_flags+=(--prerelease)
          fi

          gh release create "${{ steps.meta.outputs.tag }}" upload/* \
            --title "${{ steps.meta.outputs.name }}" \
            --target "${{ github.sha }}" \
            --generate-notes \
            "${extra_flags[@]}"
