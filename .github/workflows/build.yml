name: Build & Bundle (macOS ARM64)

on:
  workflow_dispatch:

env:
  BINARY_NAME: plumeimpactor
  BINARY_NAME_CLI: plumesign
  BUNDLE_NAME: Impactor

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build and Bundle
        run: make macos PROFILE=release BUNDLE=1

      - name: Import Signing Certificates
        uses: apple-actions/import-codesign-certs@v5
        with:
          p12-file-base64: ${{ secrets.DEV_ID_P12_BASE64 }}
          p12-password: ${{ secrets.DEV_ID_P12_PASSWORD }}

      - name: Code Sign App
        run: |
          codesign --deep --force --options runtime \
            --sign "${{ secrets.DEV_ID_IDENTITY_NAME }}" dist/Impactor.app

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          mkdir -p dist/dmg
          mv dist/Impactor.app dist/dmg/

          create-dmg \
            --volname "${{ env.BUNDLE_NAME }}" \
            --background "package/macos/background.png" \
            --window-pos 200 120 \
            --window-size 510 350 \
            --icon-size 100 \
            --icon "${{ env.BUNDLE_NAME }}.app" 160 155 \
            --hide-extension "${{ env.BUNDLE_NAME }}.app" \
            --app-drop-link 350 155 \
            dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg dist/dmg

      - name: Notarize DMG
        run: |
          xcrun notarytool submit dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg \
            --apple-id "${{ secrets.APPLE_ID_EMAIL }}" \
            --password "${{ secrets.APPLE_ID_PASSWORD }}" \
            --team-id "${{ secrets.APPLE_ID_TEAM }}" \
            --wait
          xcrun stapler staple dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.BINARY_NAME }}-macos-arm64
          path: dist/${{ env.BUNDLE_NAME }}-macos-arm64.dmg
