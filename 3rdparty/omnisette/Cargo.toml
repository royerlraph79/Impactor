[package]
name = "omnisette"
edition.workspace = true
version.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true

[features]
remote-anisette = []
async = ["dep:async-trait"]
default = ["remote-anisette", "dep:remove-async-await"]
remote-anisette-v3 = [
    "async",
    "dep:serde",
    "dep:serde_json",
    "dep:tokio-tungstenite",
    "dep:futures-util",
    "dep:chrono",
]
aos-kit = []

[dependencies]
sha2.workspace = true
base64.workspace = true
rand.workspace = true
plist.workspace = true
thiserror.workspace = true

hex.workspace = true
reqwest.workspace = true
uuid.workspace = true
android-loader = { git = "https://github.com/Dadoum/android-loader", branch = "bigger_pages" }
libc = "0.2"
log.workspace = true
async-trait = { version = "0.1", optional = true }
remove-async-await = { version = "1.0", optional = true }
serde = { workspace = true, optional = true }
serde_json = { workspace = true, optional = true }
tokio-tungstenite = { version = "0.27.0", optional = true, features = [
    "rustls-tls-webpki-roots",
] }
futures-util = { version = "0.3.28", optional = true }
chrono = { workspace = true, optional = true }
anyhow = "1.0"

[target.'cfg(target_os = "macos")'.dependencies]
dlopen2 = "0.4"
objc = "0.2"
objc-foundation = "0.1"

[dev-dependencies]
tokio.workspace = true
simplelog = "0.12"
